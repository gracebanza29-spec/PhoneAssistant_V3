name: Build Phone Assistant APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform 34 + build-tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --warning-mode all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneAssistant-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
